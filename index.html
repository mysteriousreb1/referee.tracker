<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Referee Tracker</title>
  <meta name="theme-color" content="#071b3a" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">RT</div>
        <div>
          <h1>Referee Tracker</h1>
          <p>Suivi arbitrage 5x5 & 3x3</p>
        </div>
      </div>

      <button id="refreshBtn" class="icon-btn" type="button" aria-label="Rafraîchir">
        ↻
      </button>
    </header>

    <section class="filters-card">
      <label for="seasonSelect">Saison</label>
      <select id="seasonSelect"></select>

      <label for="searchInput">Recherche</label>
      <input id="searchInput" type="search" placeholder="Club, salle, ville, collègue..." />
    </section>

    <nav class="tabs" aria-label="Navigation principale">
      <button class="tab active" data-tab="matchs" type="button">Matchs</button>
      <button class="tab" data-tab="paiements" type="button">Paiements</button>
      <button class="tab" data-tab="stats" type="button">Stats</button>
      <button class="tab" data-tab="alertes" type="button">Alertes</button>
      <button class="tab" data-tab="export" type="button">Export</button>
    </nav>

    <main>
      <section id="statusBar" class="status-bar">Chargement...</section>

      <section id="matchs" class="panel active"></section>
      <section id="paiements" class="panel"></section>
      <section id="stats" class="panel"></section>
      <section id="alertes" class="panel"></section>
      <section id="export" class="panel"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
