<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Referee Tracker</title>
  <meta name="theme-color" content="#071B3A" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-logo">RT</div>
          <div>
            <h1>Referee Tracker</h1>
            <p>Arbitrage 5x5 · 3x3 · paiements · stats</p>
          </div>
        </div>

        <button id="refreshBtn" class="refresh-btn" type="button" aria-label="Rafraîchir les données">
          ↻
        </button>
      </div>
    </header>

    <main class="content">
      <section class="toolbar">
        <div class="field">
          <label for="seasonSelect">Saison</label>
          <select id="seasonSelect"></select>
        </div>

        <div class="field search-field">
          <label for="searchInput">Recherche</label>
          <input id="searchInput" type="search" placeholder="Club, salle, ville, collègue..." />
        </div>
      </section>

      <section id="statusBar" class="status-bar">Chargement...</section>

      <nav class="tabs" aria-label="Navigation principale">
        <button class="tab active" data-tab="matchs" type="button">
          <span>🏀</span> Matchs
        </button>
        <button class="tab" data-tab="paiements" type="button">
          <span>💶</span> Paiements
        </button>
        <button class="tab" data-tab="stats" type="button">
          <span>📊</span> Stats
        </button>
        <button class="tab" data-tab="alertes" type="button">
          <span>⚠️</span> Alertes
        </button>
        <button class="tab" data-tab="export" type="button">
          <span>📋</span> Export
        </button>
      </nav>

      <section id="matchs" class="panel active"></section>
      <section id="paiements" class="panel"></section>
      <section id="stats" class="panel"></section>
      <section id="alertes" class="panel"></section>
      <section id="export" class="panel"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
